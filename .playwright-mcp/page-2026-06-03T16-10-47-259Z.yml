  - generic [ref=e78]:
    - generic [ref=e79]:
      - generic [ref=e80]: Unsere Geschichte
      - heading "Wie entstand uniworks eigentlich?" [level=2] [ref=e81]
      - paragraph [ref=e82]: "Die Idee, Studierende und Unternehmen zusammenzubringen, entstand aus eigener Erfahrung: Moritz, Thommy, David & Stefan gründeten das Unternehmen, während sie selbst noch studierten. Sie bemerkten, dass es für Studierende kaum Möglichkeiten gab, während des Studiums flexibel Praxiserfahrung zu sammeln und gleichzeitig fair entlohnt zu werden. Ebenso zeigten die Erfahrungen, die Moritz als Unternehmer sammelte, wie schwierig es sein kann, qualifizierte Arbeitskräfte für den eigenen Betrieb zu gewinnen."
      - paragraph [ref=e83]: "Aus dieser Erkenntnis wurde eine Vision, die heute Realität ist: Studierende und Unternehmen profitieren gleichermaßen von einem flexiblen Modell. Einerseits durch attraktive Löhne und eine Beschäftigung, die sich hervorragend mit dem Studium vereinbaren lässt. Andererseits Zugang zu einem großen Talentpool, der die perfekte Besetzung für jede freie Stelle ermöglicht."
    - generic:
      - img "Das uniworks Gründungsteam"
