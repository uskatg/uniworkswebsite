<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>uniworks — Jobs in deiner Stadt (interaktive Karte)</title>
<style>
  :root{
    --font-sans: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --ink-950: #0d1b12;
    --ink-600: #5a6b60;
    --uw-green: #2ab54a;
    --uw-green-strong: #1f8f3a;
    --uw-green-soft: rgba(42,181,74,.20);
    --uw-dot: #0e7a2f;
    --uw-dot-strong: #0a6526;
    --dot: 13px;          /* base dot diameter */
    --dot-hover: 20px;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; }
  body{
    font-family: var(--font-sans, 'IBM Plex Sans', system-ui, sans-serif);
    background: #ffffff;
    color: var(--ink-950, #0d1b12);
    -webkit-font-smoothing: antialiased;
  }

  /* Demo framing only — the reusable element is .jobmap */
  .demo{
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 56px 24px;
    background:
      radial-gradient(1200px 800px at 80% -10%, rgba(42,181,74,.05), transparent 60%),
      #ffffff;
  }

  /* ── The map element ───────────────────────────────────── */
  .jobmap{
    position: relative;
    width: 100%;
    max-width: 640px;
    aspect-ratio: 1246 / 1537;
    --pin-color: var(--uw-green);
  }
  .jobmap__base{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background: linear-gradient(160deg, #4fbd6e 0%, #8fd6a6 50%, #e2f6e9 100%);
    -webkit-mask-image: var(--m);
            mask-image: var(--m);
    -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
    -webkit-mask-position: center;
            mask-position: center;
    -webkit-mask-size: contain;
            mask-size: contain;
    filter: drop-shadow(0 18px 40px rgba(31,143,58,.18));
  }
  .jobmap__layer{
    position: absolute;
    inset: 0;
    z-index: 2;
  }

  /* ── A city pin ────────────────────────────────────────── */
  .pin{
    position: absolute;
    width: 0; height: 0;                 /* anchor point; children center on it */
    transform: translate(-50%, -50%);    /* place center exactly on coordinate */
    z-index: 3;
  }
  .pin__btn{
    position: absolute;
    left: 50%; top: 50%;
    width: var(--dot);
    height: var(--dot);
    margin: calc(var(--dot) / -2) 0 0 calc(var(--dot) / -2);
    padding: 0;
    border: none;
    border-radius: 999px;
    background: var(--uw-dot);
    box-shadow:
      0 0 0 3px #fff,
      0 3px 8px rgba(10,50,22,.45);
    cursor: pointer;
    transition: width .22s cubic-bezier(.34,1.56,.64,1),
                height .22s cubic-bezier(.34,1.56,.64,1),
                margin .22s cubic-bezier(.34,1.56,.64,1),
                background .2s ease;
    /* entrance */
    opacity: 0;
    transform: scale(0);
    outline: none;
  }
  .jobmap.is-in .pin__btn{
    animation: pinPop .5s cubic-bezier(.34,1.6,.5,1) forwards;
    animation-delay: var(--delay, 0ms);
  }
  @keyframes pinPop{
    0%{ opacity:0; transform: scale(0); }
    70%{ opacity:1; transform: scale(1.18); }
    100%{ opacity:1; transform: scale(1); }
  }

  /* idle ripple ring — emitted once shortly after the dot lands */
  .pin__ring{
    position: absolute;
    left: 50%; top: 50%;
    width: var(--dot); height: var(--dot);
    margin: calc(var(--dot) / -2) 0 0 calc(var(--dot) / -2);
    border-radius: 999px;
    border: 2px solid var(--uw-dot);
    opacity: 0;
    pointer-events: none;
  }
  .jobmap.is-in .pin__ring{
    animation: ripple 1.4s ease-out forwards;
    animation-delay: calc(var(--delay, 0ms) + 360ms);
  }
  @keyframes ripple{
    0%{ opacity:.55; transform: scale(1); }
    100%{ opacity:0; transform: scale(3.6); }
  }

  /* hover / focus highlight */
  .pin__btn:hover,
  .pin__btn:focus-visible{
    width: var(--dot-hover);
    height: var(--dot-hover);
    margin: calc(var(--dot-hover) / -2) 0 0 calc(var(--dot-hover) / -2);
    background: var(--uw-dot-strong);
    box-shadow:
      0 0 0 4px #fff,
      0 0 0 11px var(--uw-green-soft),
      0 6px 16px rgba(20,80,35,.34);
  }
  .pin.is-active{ z-index: 40; }

  /* ── Label tooltip ─────────────────────────────────────── */
  .pin__label{
    position: absolute;
    left: 50%;
    bottom: calc(50% + 16px);
    transform: translate(-50%, 6px);
    background: var(--ink-950, #0d1b12);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1;
    white-space: nowrap;
    padding: 8px 12px;
    border-radius: 10px;
    box-shadow: 0 10px 24px rgba(0,0,0,.22);
    opacity: 0;
    pointer-events: none;
    transition: opacity .16s ease, transform .16s cubic-bezier(.34,1.56,.64,1);
    z-index: 5;
  }
  .pin__label::after{
    content:"";
    position: absolute;
    left: 50%; top: 100%;
    width: 9px; height: 9px;
    background: var(--ink-950, #0d1b12);
    transform: translate(-50%, -55%) rotate(45deg);
    border-radius: 2px;
  }
  /* labels that sit near the top flip below the dot */
  .pin--below .pin__label{
    bottom: auto;
    top: calc(50% + 16px);
    transform: translate(-50%, -6px);
  }
  .pin--below .pin__label::after{
    top: auto; bottom: 100%;
    transform: translate(-50%, 55%) rotate(45deg);
  }
  .pin__btn:hover + .pin__label,
  .pin__btn:focus-visible + .pin__label,
  .pin.is-active .pin__label{
    opacity: 1;
    transform: translate(-50%, 0);
  }

  /* ── Featured pin (always-on label, larger dot) ───────── */
  .pin--featured{ z-index: 30; }
  .pin--featured .pin__btn{
    width: 22px; height: 22px;
    margin: -11px 0 0 -11px;
    box-shadow: 0 0 0 4px #fff, 0 5px 14px rgba(20,80,35,.38);
  }
  .jobmap.is-in .pin--featured .pin__ring{ width: 22px; height: 22px; margin: -11px 0 0 -11px; }
  .pin--featured .pin__btn:hover,
  .pin--featured .pin__btn:focus-visible{
    width: 28px; height: 28px;
    margin: -14px 0 0 -14px;
    box-shadow: 0 0 0 5px #fff, 0 0 0 13px var(--uw-green-soft), 0 7px 18px rgba(20,80,35,.4);
  }
  .pin--featured .pin__label{
    opacity: 1;
    transform: translate(-50%, 0);
    font-size: 15px;
    padding: 9px 14px;
  }

  /* comparison layout (demo only) */
  .compare{
    display: flex;
    flex-wrap: wrap;
    gap: 48px;
    justify-content: center;
    align-items: flex-start;
  }
  .compare figure{
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 460px;
  }
  .compare figcaption{
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-600, #5a6b60);
  }
  .jobmap--gray .jobmap__base{
    background: #cdd6db;
  }
  .jobmap--gray{
    --uw-dot: #2ab54a;
    --uw-dot-strong: #1f8f3a;
  }

  @media (prefers-reduced-motion: reduce){
    .pin__btn{ opacity:1; transform:none; animation:none !important; }
    .pin__ring{ display:none; }
  }

  @media (max-width: 520px){
    :root{ --dot: 11px; --dot-hover: 17px; }
    .pin__label{ font-size: 12.5px; padding: 7px 10px; }
  }
</style>

      pin.className = "pin" + (c.y < 0.085 ? " pin--below" : "") + (featured ? " pin--featured pin--below" : "");
      pin.style.left = (c.x * 100).toFixed(3) + "%";
      pin.style.top  = (c.y * 100).toFixed(3) + "%";
      pin.style.setProperty("--delay", (rank * delayStep) + "ms");
      var btn = document.createElement("button");
      btn.type = "button"; btn.className = "pin__btn";
      btn.setAttribute("aria-label", c.name + " — Jobs ansehen");
      var ring = document.createElement("span");
      ring.className = "pin__ring"; ring.setAttribute("aria-hidden", "true");
      var label = document.createElement("span");
      label.className = "pin__label"; label.textContent = c.name;
      btn.addEventListener("mouseenter", function(){ pin.classList.add("is-active"); });
      btn.addEventListener("mouseleave", function(){ pin.classList.remove("is-active"); });
      btn.addEventListener("focus", function(){ pin.classList.add("is-active"); });
      btn.addEventListener("blur", function(){ pin.classList.remove("is-active"); });
      pin.appendChild(ring); pin.appendChild(btn); pin.appendChild(label);
      layer.appendChild(pin);
    });
    if ("IntersectionObserver" in window){
      var io = new IntersectionObserver(function(entries){
        entries.forEach(function(e){ if (e.isIntersecting){ mapEl.classList.add("is-in"); io.disconnect(); } });
      }, { threshold: 0.25 });
      io.observe(mapEl);
    } else { mapEl.classList.add("is-in"); }
  }

  Array.prototype.forEach.call(document.querySelectorAll(".jobmap"), buildMap);
})();
</script>
</body>
</html>
