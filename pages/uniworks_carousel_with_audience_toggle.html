<div style="padding: 1rem 0;">
  <h2 class="sr-only">uniworks category carousel with a toggle between the Für Unternehmen and Für Studierende audiences</h2>

  <div style="display:inline-flex; gap:4px; background:var(--color-background-secondary); padding:4px; border-radius:12px; margin-bottom:1.25rem;">
    <button class="uw-tab" data-aud="unternehmen" style="border:none; border-radius:9px; padding:9px 16px; font-size:14px; font-weight:500; cursor:pointer;">Für Unternehmen</button>
    <button class="uw-tab" data-aud="studierende" style="border:none; border-radius:9px; padding:9px 16px; font-size:14px; font-weight:500; cursor:pointer;">Für Studierende</button>
  </div>

  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem;">
    <div>
      <p id="uw-eyebrow" style="margin:0; font-size:13px; color:var(--color-text-secondary);"></p>
      <h3 id="uw-heading" style="margin:2px 0 0; font-size:18px; font-weight:500; color:var(--color-text-primary);"></h3>
    </div>
    <div style="display:flex; gap:8px;">
      <button id="uw-prev" aria-label="Zurück" style="width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:0;"><i class="ti ti-arrow-left" style="font-size:18px;" aria-hidden="true"></i></button>
      <button id="uw-next" aria-label="Weiter" style="width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:0;"><i class="ti ti-arrow-right" style="font-size:18px;" aria-hidden="true"></i></button>
    </div>
  </div>

  <div id="uw-track" style="display:flex; gap:16px; overflow-x:auto; scroll-behavior:smooth; padding-bottom:8px; scrollbar-width:none;"></div>
</div>

<script>
(function(){
  const G = "#2FBF5B", GD = "#173404", GL = "#EAF3DE";
  const data = {
    unternehmen: {
      eyebrow: "Für Unternehmen",
      heading: "Für jede Branche das passende Personal",
      cards: [
        {t:"Logistik", s:"Lager, Versand und Inventur, zuverlässig besetzt.", cta:"Zu Logistik", icon:"ti-package", dark:true},
        {t:"Event", s:"Auf- und Abbau bis Einlass, alles aus einer Hand.", cta:"Zu Events", icon:"ti-ticket", dark:false},
        {t:"Catering", s:"Service- und Küchenhilfen, kurzfristig verfügbar.", cta:"Zu Catering", icon:"ti-glass-full", dark:false},
        {t:"Einzelhandel", s:"Kasse, Verkauf und Auffüllen, flexibel gebucht.", cta:"Zum Einzelhandel", icon:"ti-shopping-bag", dark:true},
        {t:"Gastronomie & Hotellerie", s:"Service und Empfang auf Sterneniveau.", cta:"Mehr erfahren", icon:"ti-tools-kitchen-2", dark:false},
        {t:"Promotion", s:"Promoter und Hostessen, die Ihre Marke vertreten.", cta:"Zu Promotion", icon:"ti-speakerphone", dark:false},
        {t:"Büro", s:"Verlässliche Unterstützung im Büroalltag.", cta:"Zum Büro", icon:"ti-briefcase", dark:true}
      ]
    },
    studierende: {
      eyebrow: "Für Studierende",
      heading: "Flexible Jobs, die zu deinem Studium passen",
      cards: [
        {t:"Flexible Schichten", s:"Wähle täglich aus offenen Jobs in deiner Nähe.", cta:"Jobs entdecken", icon:"ti-calendar-event", dark:true},
        {t:"Faire Bezahlung", s:"Immer mindestens 16 € pro Stunde.", cta:"Mehr erfahren", icon:"ti-coin-euro", dark:false},
        {t:"In der App buchen", s:"Schicht aussuchen, annehmen, loslegen.", cta:"App holen", icon:"ti-device-mobile", dark:false},
        {t:"Rund ums Studium", s:"Jobs, die sich deinem Hochschulalltag anpassen.", cta:"So funktioniert's", icon:"ti-school", dark:true},
        {t:"Deutschlandweit", s:"Über 15.000 Studierende sind schon dabei.", cta:"Jetzt registrieren", icon:"ti-map-pin", dark:false}
      ]
    }
  };

  const track = document.getElementById("uw-track");
  const tabs = document.querySelectorAll(".uw-tab");
  const eyebrow = document.getElementById("uw-eyebrow");
  const heading = document.getElementById("uw-heading");

  function render(aud){
    const set = data[aud];
    eyebrow.textContent = set.eyebrow;
    heading.textContent = set.heading;
    track.innerHTML = "";
    set.cards.forEach(c => {
      const bg = c.dark ? GD : G;
      const btnBg = c.dark ? GL : "#ffffff";
      const el = document.createElement("div");
      el.style.cssText = "flex:0 0 270px; height:380px; border-radius:16px; background:"+bg+"; position:relative; overflow:hidden; padding:24px; box-sizing:border-box;";
      el.innerHTML =
        '<h4 style="margin:0; font-size:22px; font-weight:500; color:#fff;">'+c.t+'</h4>'+
        '<p style="margin:10px 0 18px; font-size:15px; line-height:1.5; color:rgba(255,255,255,0.85);">'+c.s+'</p>'+
        '<button style="background:'+btnBg+'; color:'+GD+'; border:none; border-radius:10px; padding:11px 18px; font-size:14px; font-weight:500; cursor:pointer;">'+c.cta+'</button>'+
        '<i class="ti '+c.icon+'" aria-hidden="true" style="position:absolute; right:-10px; bottom:-10px; font-size:150px; color:rgba(255,255,255,0.12);"></i>';
      track.appendChild(el);
    });
    track.scrollTo({left:0});
  }

  function setActive(aud){
    tabs.forEach(t => {
      const on = t.dataset.aud === aud;
      t.style.background = on ? G : "transparent";
      t.style.color = on ? "#fff" : "var(--color-text-secondary)";
    });
    render(aud);
  }

  tabs.forEach(t => t.onclick = () => setActive(t.dataset.aud));
  const step = 286;
  document.getElementById("uw-next").onclick = () => track.scrollBy({left:step, behavior:"smooth"});
  document.getElementById("uw-prev").onclick = () => track.scrollBy({left:-step, behavior:"smooth"});

  setActive("unternehmen");
})();
</script>
