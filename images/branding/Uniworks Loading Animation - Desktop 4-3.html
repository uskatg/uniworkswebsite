<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>uniworks — Loading Animation (Desktop 4:3)</title>
<style>
  :root{ --uw-green:#29B54B; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:#000; overflow:hidden; }
  /* full-viewport stage, letterboxes the 4:3 canvas on black */
  .stage{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  /* 4:3 canvas — 1440x1080, scaled to fit via JS */
  .canvas{
    position:relative;
    width:1440px; height:1080px;
    flex:0 0 auto;
    transform-origin:center center;
    background:var(--uw-green);
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .canvas::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(120% 90% at 50% 42%, rgba(255,255,255,.05), rgba(0,0,0,.08) 100%);
  }

  .lockup{
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center; gap:54px;
  }
  .mark{ width:268px; height:auto; display:block; }
  .wordmark{ width:360px; height:auto; display:block; }

  /* ---- simple motion (matches phone version) ---- */
  .mark{ opacity:0; transform:translateY(28px) scale(.86); }
  .wordmark{ opacity:0; transform:translateY(32px); }
  .run .mark{ animation:markIn 1s cubic-bezier(.2,.8,.2,1) .25s forwards; }
  .run .wordmark{ animation:wordIn .85s cubic-bezier(.2,.8,.2,1) .68s forwards; }
  @keyframes markIn{
    0%{ opacity:0; transform:translateY(28px) scale(.86); }
    60%{ opacity:1; }
    100%{ opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes wordIn{
    from{ opacity:0; transform:translateY(32px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @media (prefers-reduced-motion:reduce){
    .mark,.wordmark{ opacity:1 !important; transform:none !important; }
  }

  /* replay — outside the scaled canvas so it's always usable */
  .replay{
    position:fixed; right:20px; bottom:20px; z-index:20;
    font-family:system-ui,sans-serif; font-size:13px; font-weight:600;
    color:#0c0c0d; background:rgba(255,255,255,.92); border:none; border-radius:999px;
    padding:10px 20px; cursor:pointer; display:inline-flex; align-items:center; gap:8px;
    box-shadow:0 4px 14px -4px rgba(0,0,0,.4); transition:transform .12s ease;
  }
  .replay:hover{ transform:translateY(-1px); }
  .replay svg{ width:14px; height:14px; }
</style>
</head>
